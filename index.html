<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pavluke</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital@0;1&family=DM+Sans:wght@300;400&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --fg: #f0ece4;
      --muted: #4a4742;
      --accent: #e8d5a0;
      --btn-bg: #f0ece4;
      --btn-fg: #0d0d0d;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.35;
    }

    .scene {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
    }

    .scene::after {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(232, 213, 160, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(8px);
      animation: rise 0.7s ease forwards 0.2s;
    }

    h1 {
      font-family: 'DM Mono', monospace;
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--fg);
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.8s ease forwards 0.4s;
    }

    .dot {
      color: var(--accent);
    }

    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, var(--muted), transparent);
      margin: 36px 0;
      opacity: 0;
      animation: fade 0.6s ease forwards 0.8s;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: var(--btn-bg);
      color: var(--btn-fg);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-decoration: none;
      border-radius: 2px;
      opacity: 0;
      transform: translateY(8px);
      animation: rise 0.7s ease forwards 1s;
      transition: background 0.2s, color 0.2s, gap 0.2s;
    }

    .btn:hover {
      background: var(--accent);
      gap: 16px;
    }

    .btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .corner {
      position: fixed;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fade 1s ease forwards 1.4s;
    }

    .corner--tl {
      top: 24px;
      left: 28px;
    }

    .corner--br {
      bottom: 24px;
      right: 28px;
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade {
      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="scene">
    <p class="label">under construction</p>
    <h1>pavluke<span class="dot">.</span></h1>
    <div class="divider"></div>
    <a class="btn" href="/packages">
      explore packages
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
    </a>
  </div>

  <span class="corner corner--tl">pavluke.github.io</span>
  <span class="corner corner--br">© 2026</span>
</body>

</html>
